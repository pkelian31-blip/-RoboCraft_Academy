<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ROBOCRAFT ACADEMY — Interactive Guide | CODE ROOTS SCHOOL</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --py:    #e65100;
  --py2:   #fb8c00;
  --py3:   #bf360c;
  --light: #fff3e0;
  --yellow:#ffd600;
  --blue:  #1a73e8;
  --dark:  #2e1a0a;
  --bg:    #fff8f3;
  --card:  #ffffff;
  --text:  #2d2d2d;
  --code-bg:   #0d1117;
  --code-text: #e6edf3;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* PROGRESS */
.progress-bar{height:4px;background:linear-gradient(90deg,var(--yellow),var(--py));width:0%;transition:width .8s;position:fixed;top:0;left:0;z-index:999}

/* HEADER */
.header{background:linear-gradient(135deg,#bf360c 0%,var(--py2) 55%,#ffcc80 100%);position:relative;overflow:hidden}
.header-top{display:flex;align-items:center;justify-content:space-between;padding:18px 40px 10px}
.valide-badge{background:white;color:var(--py);font-family:'Baloo 2',cursive;font-weight:800;font-size:1.1rem;padding:6px 18px;border-radius:30px}
.header-year{color:rgba(255,255,255,.8);font-size:.95rem}
.header-body{display:flex;align-items:flex-end;justify-content:space-between;padding:0 40px 0;gap:20px}
.header-text{flex:1;padding-bottom:30px}
.turbo-label{font-family:'Baloo 2',cursive;font-weight:800;font-size:4.5rem;color:white;line-height:1;text-shadow:4px 4px 0 rgba(0,0,0,.3);letter-spacing:2px}
.guide-title{font-family:'Baloo 2',cursive;font-weight:700;font-size:1.8rem;color:rgba(255,255,255,.95);margin-top:4px}
.guide-sub{color:rgba(255,255,255,.85);font-size:1rem;margin-top:8px;max-width:480px;line-height:1.5}
.module-pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}
.pill{background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.4);color:white;padding:4px 14px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s}
.pill:hover,.pill.active{background:white;color:var(--py);border-color:white}
.pill.locked{opacity:.55}
.pill .lock-ico{font-size:.7rem;margin-left:3px}

/* Mascot */
.mascot-wrap{width:220px;flex-shrink:0;position:relative;bottom:0}
.mascot-svg{width:100%;filter:drop-shadow(0 8px 24px rgba(0,0,0,.3));animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.speech-bubble{position:absolute;top:10px;right:-10px;background:white;border-radius:16px 16px 16px 4px;padding:10px 14px;font-size:.82rem;font-weight:700;color:var(--py);max-width:155px;box-shadow:0 4px 16px rgba(0,0,0,.15);animation:pop .5s ease;z-index:10;line-height:1.4}
@keyframes pop{0%{transform:scale(0);opacity:0}80%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.hshape{position:absolute;border-radius:50%;opacity:.07;pointer-events:none}
.hshape1{width:350px;height:350px;background:white;top:-100px;right:150px}
.hshape2{width:200px;height:200px;background:var(--yellow);bottom:-70px;left:80px}

/* NAV */
.nav{background:white;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:0 40px;display:flex;gap:4px;overflow-x:auto;position:sticky;top:0;z-index:100}
.nav-btn{padding:14px 18px;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;color:#555;background:none;border:none;border-bottom:3px solid transparent;cursor:pointer;white-space:nowrap;transition:all .2s}
.nav-btn:hover{color:var(--py)}
.nav-btn.active{color:var(--py);border-bottom-color:var(--py)}
.nav-btn.locked{color:#bbb}
.nav-btn .lock-ico{font-size:.72rem;margin-left:3px}

/* MAIN */
main{max-width:900px;margin:0 auto;padding:40px 24px 80px}
.section{display:none;animation:fadein .4s ease}
.section.active{display:block}
@keyframes fadein{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.page-title{font-family:'Baloo 2',cursive;font-weight:800;font-size:2rem;color:var(--py);margin-bottom:6px}
.page-sub{color:#777;font-size:.95rem;margin-bottom:32px}

/* INTRO CARD */
.intro-card{background:linear-gradient(135deg,var(--py3),var(--py2));border-radius:20px;padding:32px;color:white;display:flex;gap:24px;align-items:center;margin-bottom:32px;box-shadow:0 8px 32px rgba(191,54,12,.3)}
.intro-card .mini-m{font-size:4rem;flex-shrink:0}
.intro-card h3{font-family:'Baloo 2',cursive;font-size:1.4rem;margin-bottom:8px}
.intro-card p{opacity:.9;line-height:1.6;font-size:.95rem}

/* NOTE CARD */
.note-card{background:var(--card);border-radius:16px;box-shadow:0 2px 16px rgba(0,0,0,.07);margin-bottom:24px;overflow:hidden;transition:transform .2s,box-shadow .2s}
.note-card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.1)}
.note-card-header{display:flex;align-items:center;gap:14px;padding:18px 24px;cursor:pointer;user-select:none}
.n-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.note-card-header h3{font-family:'Baloo 2',cursive;font-weight:700;font-size:1.1rem;flex:1}
.n-badge{font-size:.7rem;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:.5px;text-transform:uppercase}
.b-base{background:#fff3e0;color:#bf360c}
.b-data{background:#e3f2fd;color:#1565c0}
.b-func{background:#f3e5f5;color:#6a1b9a}
.b-oop{background:#fce4ec;color:#880e4f}
.b-adv{background:#fff8e1;color:#e65100}
.b-lab{background:#e0f7fa;color:#006064}
.chevron{font-size:1.2rem;color:#aaa;transition:transform .3s}
.note-card.open .chevron{transform:rotate(180deg)}
.note-body{display:none;padding:0 24px 24px;border-top:1.5px solid #f0f0f0}
.note-card.open .note-body{display:block}
.note-body p{margin:12px 0 10px;color:#444;line-height:1.7;font-size:.95rem}
.note-body li{margin:5px 0 5px 18px;color:#444;line-height:1.7;font-size:.93rem}

/* CODE BLOCK */
.code-block{background:var(--code-bg);border-radius:12px;overflow:hidden;margin:14px 0;box-shadow:0 4px 20px rgba(0,0,0,.3)}
.code-bar{background:#161b22;padding:8px 14px;display:flex;align-items:center;gap:8px}
.c-dot{width:12px;height:12px;border-radius:50%}
